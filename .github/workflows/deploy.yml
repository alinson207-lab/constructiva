name: 🚀 Deploy a Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # necesario para detectar archivos modificados

      - name: 🔐 Generar config.php desde Secrets
        run: |
          cat > Php/config.php << 'PHPEOF'
          <?php
          // ============================================================
          //  CONSTRUCTIVA · Configuración Central (generado por CI/CD)
          // ============================================================
          date_default_timezone_set('America/Santo_Domingo');

          define('DB_HOST',     '${{ secrets.DB_HOST }}');
          define('DB_NAME',     '${{ secrets.DB_NAME }}');
          define('DB_USER',     '${{ secrets.DB_USER }}');
          define('DB_PASSWORD', '${{ secrets.DB_PASSWORD }}');

          define('GOOGLE_CLIENT_ID',     '${{ secrets.GOOGLE_CLIENT_ID }}');
          define('GOOGLE_CLIENT_SECRET', '${{ secrets.GOOGLE_CLIENT_SECRET }}');
          define('GOOGLE_REDIRECT_URI',  'https://constructiva.edu.do/api/google_callback.php');

          define('ZOOM_SDK_KEY',    '');
          define('ZOOM_SDK_SECRET', '');

          define('HMS_ACCESS_KEY',  '${{ secrets.HMS_ACCESS_KEY }}');
          define('HMS_SECRET',      '${{ secrets.HMS_SECRET }}');
          define('HMS_TEMPLATE_ID', '${{ secrets.HMS_TEMPLATE_ID }}');
          define('HMS_SUBDOMAIN',   '${{ secrets.HMS_SUBDOMAIN }}');

          define('SITE_URL', 'https://constructiva.edu.do');

          define('SESSION_HOURS',       2);
          define('SESSION_SLIDING_MIN', 10);
          define('SESSION_GOOGLE_DAYS', 7);

          define('CORS_ALLOWED_ORIGINS', [
              'https://constructiva.edu.do',
              'https://www.constructiva.edu.do',
          ]);
          PHPEOF

      - name: 📤 Upload a Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /home/u314398385/domains/constructiva.edu.do/public_html/
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vscode/**
            .gitignore
            README.md
            **/old/**
